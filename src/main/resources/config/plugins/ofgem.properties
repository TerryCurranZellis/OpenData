# OpenData Framework Phase 1 plugin definition
# Ofgem Energy Price Cap

plugin.id=ofgem
plugin.display-name=Ofgem Energy Price Cap
plugin.description=Discovers and downloads the latest Ofgem final levelised price-cap model.
plugin.implementation-class=com.towermarsh.opendata.plugin.ofgem.OfgemPlugin
plugin.enabled=true
plugin.configuration-version=1

dataset.id=ofgem-energy-price-cap

# Ofgem updates the price cap quarterly. The current XLSX URL changes, so the
# plugin starts from the stable official publication page and discovers the
# current "Final levelised cap rates model" workbook.

endpoint.price-cap-publication.type=landing-page
endpoint.price-cap-publication.url=https://www.ofgem.gov.uk/energy-regulation/domestic-and-non-domestic/energy-pricing-rules/energy-price-cap
endpoint.price-cap-publication.method=GET
endpoint.price-cap-publication.format=html
endpoint.price-cap-publication.strategy=html-link-discovery
endpoint.price-cap-publication.enabled=true
endpoint.price-cap-publication.order=10
endpoint.price-cap-publication.header.User-Agent=OpenDataFramework/0.1 (+https://github.com/towermarsh/opendata)
endpoint.price-cap-publication.header.Accept=text/html,application/xhtml+xml

endpoint.price-cap-publication.link-discovery.css-selector=a[href]
endpoint.price-cap-publication.link-discovery.href-pattern=(?i).*\\.xlsx(?:\\?.*)?$
endpoint.price-cap-publication.link-discovery.text-pattern=(?i).*final levelised cap rates model.*
endpoint.price-cap-publication.link-discovery.select-last=false

# Parser and archive settings represented as typed plugin properties.
property.download.output-filename.value=ofgem-final-levelised-cap-rates.xlsx
property.download.output-filename.type=string
property.download.output-filename.description=Local filename used for the discovered workbook.

property.download.follow-redirects.value=true
property.download.follow-redirects.type=boolean

property.download.connect-timeout.value=PT30S
property.download.connect-timeout.type=duration

property.download.request-timeout.value=PT120S
property.download.request-timeout.type=duration

property.archive.original-file.value=true
property.archive.original-file.type=boolean

property.excel.sheet-selection.value=all-visible
property.excel.sheet-selection.type=string
property.excel.sheet-selection.description=Initial parser setting; workbook inspection may refine this later.

property.excel.evaluate-formulas.value=true
property.excel.evaluate-formulas.type=boolean

property.database.target-schema.value=dbo
property.database.target-schema.type=string

property.database.target-table.value=OfgemEnergyPriceCap
property.database.target-table.type=string

# No API key is currently required for this public Ofgem publication.
# Credential blocks can be added later without changing the Java model.
