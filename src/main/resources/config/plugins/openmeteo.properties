# =============================================================================
# OpenMeteo plugin
# Historical daily weather observations from the Open-Meteo archive API.
# =============================================================================

plugin.id=openmeteo
plugin.display-name=OpenMeto Historical Weather
plugin.description=Downloads daily historical weather observations from Open-Meteo.
plugin.implementation-class=com.towermarsh.opendata.plugin.openmeteo.OpenMeteoPlugin
plugin.enabled=true
plugin.configuration-version=1

dataset.id=openmeteo-daily-weather

# -----------------------------------------------------------------------------
# Archive API endpoint
# -----------------------------------------------------------------------------
endpoint.archive.type=API
endpoint.archive.url=https://archive-api.open-meteo.com/v1/archive
endpoint.archive.method=GET
endpoint.archive.format=JSON
endpoint.archive.strategy=DIRECT_HTTP
endpoint.archive.enabled=true
endpoint.archive.order=1

# -----------------------------------------------------------------------------
# Location
# Existing values from WeatherApiClient.
# -----------------------------------------------------------------------------
property.location-name.value=Home
property.location-name.type=STRING
property.location-name.sensitive=false
property.location-name.description=Display name stored with each weather record.

# Approx location of 55 Woodcock Avenue
property.latitude.value=51.674304
property.latitude.type=DECIMAL
property.latitude.sensitive=false
property.latitude.description=Latitude in decimal degrees, from -90 to 90.

property.longitude.value=-0.785602
property.longitude.type=DECIMAL
property.longitude.sensitive=false
property.longitude.description=Longitude in decimal degrees, from -180 to 180.

property.timezone.value=Europe/London
property.timezone.type=STRING
property.timezone.sensitive=false
property.timezone.description=IANA timezone requested from Open-Meteo.

# -----------------------------------------------------------------------------
# Date range
# Leave start-date and end-date blank to use the relative defaults.
# The archive API is normally best used through yesterday because the current
# date may not yet have complete historical observations.
# Start date set to 01/01/2000 will still give 26 years data
# -----------------------------------------------------------------------------
property.start-date.value=2000-01-01
property.start-date.type=STRING
property.start-date.sensitive=false
property.start-date.description=Optional inclusive start date in ISO yyyy-MM-dd format.

property.end-date.value=
property.end-date.type=STRING
property.end-date.sensitive=false
property.end-date.description=Optional inclusive end date in ISO yyyy-MM-dd format.

property.default-start-days-ago.value=365
property.default-start-days-ago.type=INTEGER
property.default-start-days-ago.sensitive=false
property.default-start-days-ago.description=Number of days before the resolved end date when start-date is blank.

property.include-current-date.value=false
property.include-current-date.type=BOOLEAN
property.include-current-date.sensitive=false
property.include-current-date.description=Whether today's date may be used when end-date is blank.

# -----------------------------------------------------------------------------
# HTTP behaviour
# -----------------------------------------------------------------------------
property.connect-timeout-seconds.value=30
property.connect-timeout-seconds.type=INTEGER
property.connect-timeout-seconds.sensitive=false
property.connect-timeout-seconds.description=HTTP connection timeout in seconds.

property.request-timeout-seconds.value=60
property.request-timeout-seconds.type=INTEGER
property.request-timeout-seconds.sensitive=false
property.request-timeout-seconds.description=Complete Open-Meteo request timeout in seconds.
